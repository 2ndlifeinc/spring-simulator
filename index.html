<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Spring Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --accent2: #7c5cf7;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --input-bg: #252836;
    --tab-active: #4f8ef7;
    --success: #34d399;
    --warn: #fbbf24;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .spring-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .tab-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .panel {
    width: 300px;
    min-width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .param-row {
    margin-bottom: 14px;
  }

  .param-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text);
  }

  .param-label span { color: var(--text-dim); font-size: 12px; }

  .param-value-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    width: 60px;
    padding: 2px 6px;
    border-radius: 4px;
    text-align: right;
  }

  .param-value-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(79,142,247,0.5);
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 10px rgba(79,142,247,0.8);
  }

  .select-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .select-label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
  }

  select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    width: 100%;
  }

  select:focus { border-color: var(--accent); }

  .extra-section {
    display: none;
  }
  .extra-section.visible { display: block; }

  /* Physics info cards */
  .info-cards {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
    border-top: 1px solid var(--border);
  }

  .info-card {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .info-card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .info-card-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--success);
  }

  .info-card-unit {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* 3D VIEWER */
  .viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #threeCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .viewer-hint {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    pointer-events: none;
    line-height: 1.6;
    background: rgba(15,17,23,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(79,142,247,0.15);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.3);
    margin-left: 4px;
  }

  .torsion-leg-row {
    margin-bottom: 14px;
  }

  .angle-display {
    font-size: 24px;
    font-weight: 700;
    color: var(--warn);
    text-align: center;
    padding: 8px 0;
  }

  @media (max-width: 700px) {
    .panel { width: 240px; min-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <h1>⚙️ 3D Spring Simulator</h1>
  <div class="spring-tabs">
    <button class="tab-btn active" data-type="compression">압축 (Compression)</button>
    <button class="tab-btn" data-type="extension">인장 (Extension)</button>
    <button class="tab-btn" data-type="torsion">토션 (Torsion)</button>
  </div>
</header>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel">

    <!-- Basic Parameters -->
    <div class="section">
      <div class="section-title">기본 파라미터</div>

      <div class="param-row">
        <div class="param-label">
          와이어 직경 (d)<span>mm</span>
          <input class="param-value-input" type="number" id="wireDiamVal" value="2" min="0.5" max="10" step="0.1">
        </div>
        <input type="range" id="wireDiam" min="0.5" max="10" step="0.1" value="2">
      </div>

      <div class="param-row">
        <div class="param-label">
          코일 외경 (D)<span>mm</span>
          <input class="param-value-input" type="number" id="outerDiamVal" value="25" min="5" max="100" step="0.5">
        </div>
        <input type="range" id="outerDiam" min="5" max="100" step="0.5" value="25">
      </div>

      <div class="param-row">
        <div class="param-label">
          피치 (p)<span>mm</span>
          <input class="param-value-input" type="number" id="pitchVal" value="5" min="1" max="30" step="0.1">
        </div>
        <input type="range" id="pitch" min="1" max="30" step="0.1" value="5">
      </div>

      <div class="param-row">
        <div class="param-label">
          총 감김수 (Nt)<span>coils</span>
          <input class="param-value-input" type="number" id="totalCoilsVal" value="8" min="2" max="30" step="0.5">
        </div>
        <input type="range" id="totalCoils" min="2" max="30" step="0.5" value="8">
      </div>
    </div>

    <!-- Material -->
    <div class="section">
      <div class="section-title">소재 선택</div>
      <div class="select-group">
        <select id="material">
          <option value="SWP">SWP (피아노선) — G: 78.5 GPa</option>
          <option value="SUS304">SUS304 (스테인리스) — G: 68.6 GPa</option>
          <option value="SWO">SWO (오일템퍼선) — G: 78.5 GPa</option>
          <option value="SWPB">SWPB (경질선) — G: 78.5 GPa</option>
          <option value="C17200">C17200 (베릴륨동) — G: 48.0 GPa</option>
        </select>
      </div>
    </div>

    <!-- Extension Hook Options -->
    <div class="section extra-section" id="extensionOptions">
      <div class="section-title">훅 형상 <span class="badge">Extension</span></div>
      <div class="select-group">
        <div class="select-label">훅 타입</div>
        <select id="hookType">
          <option value="machine">Machine Hook</option>
          <option value="side">Side Hook</option>
          <option value="loop">Full Loop</option>
        </select>
      </div>
    </div>

    <!-- Torsion Leg Options -->
    <div class="section extra-section" id="torsionOptions">
      <div class="section-title">다리 각도 <span class="badge">Torsion</span></div>
      <div class="torsion-leg-row">
        <div class="param-label">다리 1 각도</div>
        <input type="range" id="leg1Angle" min="0" max="360" step="5" value="0">
      </div>
      <div class="torsion-leg-row">
        <div class="param-label">다리 2 각도</div>
        <input type="range" id="leg2Angle" min="0" max="360" step="5" value="90">
      </div>
      <div class="angle-display" id="legAngleDisplay">90°</div>
    </div>

    <!-- Physics Info -->
    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-label">자유장 (Free Length)</div>
        <div class="info-card-value" id="freeLengthDisplay">40.0<span class="info-card-unit">mm</span></div>
      </div>
      <div class="info-card">
        <div class="info-card-label">스프링 상수 k</div>
        <div class="info-card-value" id="springKDisplay">—<span class="info-card-unit">N/mm</span></div>
      </div>
      <div class="info-card">
        <div class="info-card-label">평균 코일 직경 (D_mean)</div>
        <div class="info-card-value" id="meanDiamDisplay">—<span class="info-card-unit">mm</span></div>
      </div>
    </div>
  </div>

  <!-- 3D VIEWER -->
  <div class="viewer">
    <canvas id="threeCanvas"></canvas>
    <div class="viewer-hint">
      🖱 드래그: 회전<br>
      🖱 스크롤: 줌<br>
      🖱 우클릭: 이동
    </div>
  </div>
</div>

<!-- Three.js + OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// OrbitControls (inline, r128 compatible)
// ─────────────────────────────────────────────
(function(){
const OrbitControls = function(object, domElement) {
  this.object = object;
  this.domElement = domElement;
  this.enabled = true;
  this.target = new THREE.Vector3();
  this.minDistance = 0;
  this.maxDistance = Infinity;
  this.minZoom = 0;
  this.maxZoom = Infinity;
  this.enableDamping = false;
  this.dampingFactor = 0.05;
  this.enableZoom = true;
  this.zoomSpeed = 1.0;
  this.enableRotate = true;
  this.rotateSpeed = 1.0;
  this.enablePan = true;
  this.panSpeed = 1.0;
  this.screenSpacePanning = true;
  this.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

  const scope = this;
  const STATE = { NONE:-1, ROTATE:0, DOLLY:1, PAN:2, TOUCH_ROTATE:3, TOUCH_PAN:4, TOUCH_DOLLY_PAN:5, TOUCH_DOLLY_ROTATE:6 };
  let state = STATE.NONE;
  const EPS = 0.000001;
  const spherical = new THREE.Spherical();
  const sphericalDelta = new THREE.Spherical();
  let scale = 1;
  const panOffset = new THREE.Vector3();
  let zoomChanged = false;
  const rotateStart = new THREE.Vector2();
  const rotateEnd = new THREE.Vector2();
  const rotateDelta = new THREE.Vector2();
  const panStart = new THREE.Vector2();
  const panEnd = new THREE.Vector2();
  const panDelta = new THREE.Vector2();
  const dollyStart = new THREE.Vector2();
  const dollyEnd = new THREE.Vector2();
  const dollyDelta = new THREE.Vector2();

  function getAutoRotationAngle(){ return 2*Math.PI/60/60*scope.autoRotateSpeed; }
  function getZoomScale(){ return Math.pow(0.95, scope.zoomSpeed); }
  function rotateLeft(angle){ sphericalDelta.theta -= angle; }
  function rotateUp(angle){ sphericalDelta.phi -= angle; }

  const panLeft = (function(){
    const v = new THREE.Vector3();
    return function(distance, objectMatrix){
      v.setFromMatrixColumn(objectMatrix, 0);
      v.multiplyScalar(-distance);
      panOffset.add(v);
    };
  })();

  const panUp = (function(){
    const v = new THREE.Vector3();
    return function(distance, objectMatrix){
      if(scope.screenSpacePanning){ v.setFromMatrixColumn(objectMatrix, 1); }
      else{ v.setFromMatrixColumn(objectMatrix, 0); v.crossVectors(scope.object.up, v); }
      v.multiplyScalar(distance);
      panOffset.add(v);
    };
  })();

  const pan = (function(){
    const offset = new THREE.Vector3();
    return function(deltaX, deltaY){
      const el = scope.domElement;
      if(scope.object.isPerspectiveCamera){
        const pos = scope.object.position;
        offset.copy(pos).sub(scope.target);
        let targetDist = offset.length();
        targetDist *= Math.tan((scope.object.fov/2)*Math.PI/180);
        panLeft(2*deltaX*targetDist/el.clientHeight, scope.object.matrix);
        panUp(2*deltaY*targetDist/el.clientHeight, scope.object.matrix);
      } else {
        panLeft(deltaX*(scope.object.right-scope.object.left)/scope.object.zoom/el.clientWidth, scope.object.matrix);
        panUp(deltaY*(scope.object.top-scope.object.bottom)/scope.object.zoom/el.clientHeight, scope.object.matrix);
      }
    };
  })();

  function dollyOut(ds){ if(scope.object.isPerspectiveCamera){ scale /= ds; } else { scope.object.zoom = Math.max(scope.minZoom, Math.min(scope.maxZoom, scope.object.zoom*ds)); scope.object.updateProjectionMatrix(); zoomChanged=true; } }
  function dollyIn(ds){ if(scope.object.isPerspectiveCamera){ scale *= ds; } else { scope.object.zoom = Math.max(scope.minZoom, Math.min(scope.maxZoom, scope.object.zoom/ds)); scope.object.updateProjectionMatrix(); zoomChanged=true; } }

  this.update = (function(){
    const offset = new THREE.Vector3();
    const quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0,1,0));
    const quatInverse = quat.clone().invert();
    const lastPos = new THREE.Vector3();
    const lastQuat = new THREE.Quaternion();
    return function(){
      const pos = scope.object.position;
      offset.copy(pos).sub(scope.target);
      offset.applyQuaternion(quat);
      spherical.setFromVector3(offset);
      spherical.theta += sphericalDelta.theta;
      spherical.phi += sphericalDelta.phi;
      spherical.phi = Math.max(EPS, Math.min(Math.PI-EPS, spherical.phi));
      spherical.radius *= scale;
      spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
      scope.target.add(panOffset);
      offset.setFromSpherical(spherical);
      offset.applyQuaternion(quatInverse);
      pos.copy(scope.target).add(offset);
      scope.object.lookAt(scope.target);
      if(scope.enableDamping){ sphericalDelta.theta *= (1-scope.dampingFactor); sphericalDelta.phi *= (1-scope.dampingFactor); panOffset.multiplyScalar(1-scope.dampingFactor); }
      else{ sphericalDelta.set(0,0,0); panOffset.set(0,0,0); }
      scale = 1;
      if(zoomChanged || lastPos.distanceToSquared(scope.object.position)>EPS || 8*(1-lastQuat.dot(scope.object.quaternion))>EPS){
        scope.dispatchEvent({type:'change'}); lastPos.copy(scope.object.position); lastQuat.copy(scope.object.quaternion); zoomChanged=false;
        return true;
      }
      return false;
    };
  })();

  this.dispose = function(){
    scope.domElement.removeEventListener('contextmenu', onContextMenu);
    scope.domElement.removeEventListener('pointerdown', onPointerDown);
    scope.domElement.removeEventListener('wheel', onMouseWheel);
    scope.domElement.removeEventListener('touchstart', onTouchStart);
    scope.domElement.removeEventListener('touchend', onTouchEnd);
    scope.domElement.removeEventListener('touchmove', onTouchMove);
    scope.domElement.ownerDocument.removeEventListener('pointermove', onPointerMove);
    scope.domElement.ownerDocument.removeEventListener('pointerup', onPointerUp);
  };

  function handleMouseDownRotate(e){ rotateStart.set(e.clientX, e.clientY); }
  function handleMouseDownDolly(e){ dollyStart.set(e.clientX, e.clientY); }
  function handleMouseDownPan(e){ panStart.set(e.clientX, e.clientY); }
  function handleMouseMoveRotate(e){
    rotateEnd.set(e.clientX, e.clientY);
    rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
    const el = scope.domElement;
    rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);
    rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);
    rotateStart.copy(rotateEnd);
    scope.update();
  }
  function handleMouseMoveDolly(e){
    dollyEnd.set(e.clientX, e.clientY);
    dollyDelta.subVectors(dollyEnd, dollyStart);
    if(dollyDelta.y>0) dollyOut(getZoomScale()); else if(dollyDelta.y<0) dollyIn(getZoomScale());
    dollyStart.copy(dollyEnd);
    scope.update();
  }
  function handleMouseMovePan(e){
    panEnd.set(e.clientX, e.clientY);
    panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
    pan(panDelta.x, panDelta.y);
    panStart.copy(panEnd);
    scope.update();
  }
  function handleMouseWheel(e){
    if(e.deltaY<0) dollyIn(getZoomScale()); else if(e.deltaY>0) dollyOut(getZoomScale());
    scope.update();
  }

  function onPointerDown(e){
    if(!scope.enabled) return;
    scope.domElement.ownerDocument.addEventListener('pointermove', onPointerMove);
    scope.domElement.ownerDocument.addEventListener('pointerup', onPointerUp);
    if(e.pointerType==='touch'){ onTouchStart(e); return; }
    switch(e.button){
      case 0: if(scope.mouseButtons.LEFT===THREE.MOUSE.ROTATE){ handleMouseDownRotate(e); state=STATE.ROTATE; } else if(scope.mouseButtons.LEFT===THREE.MOUSE.PAN){ handleMouseDownPan(e); state=STATE.PAN; } break;
      case 1: handleMouseDownDolly(e); state=STATE.DOLLY; break;
      case 2: handleMouseDownPan(e); state=STATE.PAN; break;
    }
  }
  function onPointerMove(e){
    if(!scope.enabled) return;
    if(e.pointerType==='touch'){ onTouchMove(e); return; }
    switch(state){
      case STATE.ROTATE: handleMouseMoveRotate(e); break;
      case STATE.DOLLY: handleMouseMoveDolly(e); break;
      case STATE.PAN: handleMouseMovePan(e); break;
    }
  }
  function onPointerUp(e){
    scope.domElement.ownerDocument.removeEventListener('pointermove', onPointerMove);
    scope.domElement.ownerDocument.removeEventListener('pointerup', onPointerUp);
    scope.dispatchEvent({type:'end'}); state=STATE.NONE;
  }
  function onMouseWheel(e){
    if(!scope.enabled||!scope.enableZoom||(state!==STATE.NONE&&state!==STATE.ROTATE)) return;
    e.preventDefault(); e.stopPropagation();
    scope.dispatchEvent({type:'start'}); handleMouseWheel(e); scope.dispatchEvent({type:'end'});
  }
  function onTouchStart(e){ /* simplified */ }
  function onTouchMove(e){ /* simplified */ }
  function onTouchEnd(e){ scope.dispatchEvent({type:'end'}); state=STATE.NONE; }
  function onContextMenu(e){ if(!scope.enabled) return; e.preventDefault(); }

  scope.domElement.addEventListener('contextmenu', onContextMenu);
  scope.domElement.addEventListener('pointerdown', onPointerDown);
  scope.domElement.addEventListener('wheel', onMouseWheel, {passive:false});
  scope.domElement.addEventListener('touchstart', onTouchStart, {passive:false});
  scope.domElement.addEventListener('touchend', onTouchEnd);
  scope.domElement.addEventListener('touchmove', onTouchMove, {passive:false});
  this.update();
};
OrbitControls.prototype = Object.create(THREE.EventDispatcher.prototype);
OrbitControls.prototype.constructor = OrbitControls;
THREE.OrbitControls = OrbitControls;
})();

// ─────────────────────────────────────────────
// SPRING SIMULATOR CORE
// ─────────────────────────────────────────────

const MATERIALS_G = { SWP: 78.5, SUS304: 68.6, SWO: 78.5, SWPB: 78.5, C17200: 48.0 };

// State
const state = {
  type: 'compression',
  wireDiam: 2,
  outerDiam: 25,
  pitch: 5,
  totalCoils: 8,
  material: 'SWP',
  hookType: 'machine',
  leg1Angle: 0,
  leg2Angle: 90
};

// ── Three.js Setup ──
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);
scene.fog = new THREE.Fog(0x0f1117, 200, 500);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(80, 60, 100);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 400;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight1.position.set(80, 120, 80);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(2048, 2048);
dirLight1.shadow.camera.near = 0.1;
dirLight1.shadow.camera.far = 500;
dirLight1.shadow.camera.left = -100;
dirLight1.shadow.camera.right = 100;
dirLight1.shadow.camera.top = 100;
dirLight1.shadow.camera.bottom = -100;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x6699ff, 0.4);
dirLight2.position.set(-60, 40, -60);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xffffff, 0.3, 200);
pointLight.position.set(0, 80, 0);
scene.add(pointLight);

// Grid
const gridHelper = new THREE.GridHelper(200, 40, 0x2a2d3a, 0x1e2130);
gridHelper.position.y = -30;
scene.add(gridHelper);

// Spring mesh container
let springGroup = new THREE.Group();
scene.add(springGroup);

// ── Metal Material ──
function createMetalMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0xb0b8c8,
    metalness: 0.9,
    roughness: 0.2,
    envMapIntensity: 1.0,
  });
}

// ── Helper: create CatmullRomCurve from points ──
function buildSpringCurve(type) {
  const d = state.wireDiam;
  const D_outer = state.outerDiam;
  const D_mean = D_outer - d;    // mean coil diameter
  const R = D_mean / 2;
  const pitch = state.pitch;
  const N = state.totalCoils;

  const points = [];
  const segments = Math.max(60, Math.floor(N * 60));

  if (type === 'compression' || type === 'extension') {
    // closed-end flat coils (compression) or tight coils (extension)
    const isClosed = (type === 'compression');

    // Bottom closed turn
    if (isClosed) {
      const cSegs = 30;
      for (let i = 0; i <= cSegs; i++) {
        const t = i / cSegs;
        const angle = t * 2 * Math.PI;
        const rise = d * 0.05 * t; // very slight rise for closed end
        points.push(new THREE.Vector3(R * Math.cos(angle), rise, R * Math.sin(angle)));
      }
    }

    // Active coils
    const startY = isClosed ? d * 0.05 : 0;
    const activeTurns = isClosed ? Math.max(1, N - 2) : N;
    const totalHeight = activeTurns * pitch;

    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const angle = t * activeTurns * 2 * Math.PI;
      const y = startY + t * totalHeight;
      points.push(new THREE.Vector3(R * Math.cos(angle), y, R * Math.sin(angle)));
    }

    // Top closed turn
    if (isClosed) {
      const topY = startY + totalHeight;
      const cSegs = 30;
      const lastAngle = activeTurns * 2 * Math.PI;
      for (let i = 1; i <= cSegs; i++) {
        const t = i / cSegs;
        const angle = lastAngle + t * 2 * Math.PI;
        const rise = topY + d * 0.05 * (1 - t);
        points.push(new THREE.Vector3(R * Math.cos(angle), rise, R * Math.sin(angle)));
      }
    }

    return { points, height: isClosed ? totalHeight + d * 0.1 : totalHeight, R };
  }

  if (type === 'torsion') {
    // Torsion: tight coils + two legs
    const legLen = R * 2.5;
    const leg1 = state.leg1Angle * Math.PI / 180;
    const leg2 = state.leg2Angle * Math.PI / 180;

    // Leg 1 start (straight line into first coil)
    const legSegs = 20;
    for (let i = legSegs; i >= 0; i--) {
      const t = i / legSegs;
      const x = legLen * t * Math.cos(leg1);
      const z = legLen * t * Math.sin(leg1);
      points.push(new THREE.Vector3(R + x, 0, z));
    }

    // Coil body (tight = near-zero pitch)
    const tightPitch = d * 1.05;
    const totalH = N * tightPitch;
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const angle = leg1 + t * N * 2 * Math.PI;
      const y = t * totalH;
      points.push(new THREE.Vector3(R * Math.cos(angle), y, R * Math.sin(angle)));
    }

    // Leg 2 end
    const lastAngle = leg1 + N * 2 * Math.PI;
    for (let i = 1; i <= legSegs; i++) {
      const t = i / legSegs;
      const x = legLen * t * Math.cos(leg2 + lastAngle);
      const z = legLen * t * Math.sin(leg2 + lastAngle);
      points.push(new THREE.Vector3(R * Math.cos(lastAngle) + x, totalH, R * Math.sin(lastAngle) + z));
    }

    return { points, height: totalH, R };
  }
}

// ── Build Hook geometry ──
function buildHookCurve(position, type, radius, wireDiam, atTop) {
  const pts = [];
  const R = radius;
  const sign = atTop ? 1 : -1;
  const baseY = position;
  const hookR = R * 0.45;

  if (type === 'machine') {
    // Machine hook: D-shaped hook angled upward
    const segs = 40;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const angle = -Math.PI * 0.15 + t * Math.PI * 1.3;
      const x = hookR * Math.cos(angle) + R;
      const y = baseY + sign * (hookR * Math.sin(angle) + wireDiam * 0.5);
      pts.push(new THREE.Vector3(x, y, 0));
    }
  } else if (type === 'side') {
    // Side hook: hook goes to the side
    const segs = 40;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const angle = Math.PI * 0.5 * t;
      pts.push(new THREE.Vector3(
        R + hookR * Math.sin(angle),
        baseY + sign * hookR * (1 - Math.cos(angle)),
        0
      ));
    }
    // Add a straight leg
    for (let i = 1; i <= 15; i++) {
      const t = i / 15;
      pts.push(new THREE.Vector3(R + hookR, baseY + sign * (hookR + t * hookR * 1.2), 0));
    }
  } else {
    // Full loop
    const segs = 60;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      const angle = t * 2 * Math.PI;
      pts.push(new THREE.Vector3(
        R + hookR * Math.cos(angle),
        baseY + sign * (hookR + hookR * Math.sin(angle)),
        0
      ));
    }
  }
  return pts;
}

// ── Main spring build function ──
function buildSpring() {
  // Clear old meshes
  while (springGroup.children.length > 0) {
    const child = springGroup.children[0];
    child.geometry?.dispose();
    springGroup.remove(child);
  }

  const d = state.wireDiam;
  const tubeRadius = d / 2;
  const mat = createMetalMaterial();

  const result = buildSpringCurve(state.type);
  if (!result) return;

  const { points, height, R } = result;

  // Build tube from points
  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
  const tubeSegments = Math.max(200, points.length * 3);
  const radialSegments = 14;
  const geometry = new THREE.TubeGeometry(curve, tubeSegments, tubeRadius, radialSegments, false);
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  springGroup.add(mesh);

  // Add hooks for extension spring
  if (state.type === 'extension') {
    const hookType = state.hookType;

    // Bottom hook
    const botPts = buildHookCurve(0, hookType, R, d, false);
    if (botPts.length > 1) {
      const botCurve = new THREE.CatmullRomCurve3(botPts.map(p => p.clone()), false);
      const botGeo = new THREE.TubeGeometry(botCurve, 40, tubeRadius, 12, false);
      const botMesh = new THREE.Mesh(botGeo, mat);
      botMesh.castShadow = true;
      springGroup.add(botMesh);
    }

    // Top hook
    const topPts = buildHookCurve(height, hookType, R, d, true);
    if (topPts.length > 1) {
      const topCurve = new THREE.CatmullRomCurve3(topPts.map(p => p.clone()), false);
      const topGeo = new THREE.TubeGeometry(topCurve, 40, tubeRadius, 12, false);
      const topMesh = new THREE.Mesh(topGeo, mat);
      topMesh.castShadow = true;
      springGroup.add(topMesh);
    }
  }

  // Center spring group at origin
  const box = new THREE.Box3().setFromObject(springGroup);
  const center = new THREE.Vector3();
  box.getCenter(center);
  springGroup.position.sub(center);
  springGroup.position.y += height * 0.5;

  // Adjust camera distance based on spring size
  const size = box.getSize(new THREE.Vector3()).length();
  const camDist = Math.max(50, size * 2.5);
  camera.position.setLength(camDist);
  controls.update();

  updatePhysics(height, R);
}

// ── Physics calculation ──
function updatePhysics(freeLen, Rmean) {
  const d = state.wireDiam;
  const D = Rmean * 2; // mean coil diameter
  const G = MATERIALS_G[state.material] * 1000; // GPa → N/mm²
  const N = state.totalCoils;
  const Na = state.type === 'compression' ? Math.max(1, N - 2) : N;

  // Free length
  const Lf = state.type === 'compression'
    ? (N * state.pitch) + (d * 2)
    : state.type === 'extension'
    ? (N * state.pitch) + (d * 2)
    : N * (d * 1.05);

  // Spring constant k = G*d^4 / (8*D^3*Na) [N/mm]
  const k = (G * Math.pow(d, 4)) / (8 * Math.pow(D, 3) * Na);

  document.getElementById('freeLengthDisplay').innerHTML =
    `${Lf.toFixed(1)}<span class="info-card-unit">mm</span>`;
  document.getElementById('springKDisplay').innerHTML =
    `${k.toFixed(3)}<span class="info-card-unit">N/mm</span>`;
  document.getElementById('meanDiamDisplay').innerHTML =
    `${D.toFixed(1)}<span class="info-card-unit">mm</span>`;
}

// ── Render loop ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function resize() {
  const viewer = document.querySelector('.viewer');
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', resize);
resize();

// ── UI wiring ──
function syncSliderValue(sliderId, valId, stateKey) {
  const slider = document.getElementById(sliderId);
  const input = document.getElementById(valId);
  slider.addEventListener('input', () => {
    input.value = slider.value;
    state[stateKey] = parseFloat(slider.value);
    buildSpring();
  });
  input.addEventListener('change', () => {
    const v = Math.min(parseFloat(slider.max), Math.max(parseFloat(slider.min), parseFloat(input.value) || parseFloat(slider.min)));
    input.value = v;
    slider.value = v;
    state[stateKey] = v;
    buildSpring();
  });
}

syncSliderValue('wireDiam', 'wireDiamVal', 'wireDiam');
syncSliderValue('outerDiam', 'outerDiamVal', 'outerDiam');
syncSliderValue('pitch', 'pitchVal', 'pitch');
syncSliderValue('totalCoils', 'totalCoilsVal', 'totalCoils');

document.getElementById('material').addEventListener('change', (e) => {
  state.material = e.target.value;
  buildSpring();
});

document.getElementById('hookType').addEventListener('change', (e) => {
  state.hookType = e.target.value;
  buildSpring();
});

const leg1 = document.getElementById('leg1Angle');
const leg2 = document.getElementById('leg2Angle');
function updateLegAngles() {
  state.leg1Angle = parseFloat(leg1.value);
  state.leg2Angle = parseFloat(leg2.value);
  const diff = Math.abs(state.leg2Angle - state.leg1Angle) % 360;
  document.getElementById('legAngleDisplay').textContent = diff + '°';
  buildSpring();
}
leg1.addEventListener('input', updateLegAngles);
leg2.addEventListener('input', updateLegAngles);

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.type = btn.dataset.type;

    document.getElementById('extensionOptions').classList.toggle('visible', state.type === 'extension');
    document.getElementById('torsionOptions').classList.toggle('visible', state.type === 'torsion');

    buildSpring();
  });
});

// ── Initial build ──
buildSpring();
animate();
</script>
